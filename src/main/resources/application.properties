spring.application.name=expense-subscription-tracker-service

# Database settings: use environment variables on Render (with sensible fallbacks)
# Set these in Render dashboard: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:6543/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.obrqcxurldvvnseciehb}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:04603As312+}

# Driver & dialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hikari / SSL (Supabase may require sslMode=require)
spring.datasource.hikari.data-source-properties.sslMode=${DB_SSLMODE:require}

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html

# Server port (Render injects PORT env var)
server.port=${PORT:1881}
